body:
  text: 因緣心釋論開決記整理者華方田題解因緣心釋論開決記中國佛教大乘空宗典籍作者不詳一卷本文獻是對龍樹所著因緣心論頌因緣心論釋所作的疏釋作者首先從四個方面作了論述一介紹了因緣心論頌及因緣心論釋的作者龍樹大師二說明了龍樹造此論及釋的原因是為欲斷除五德弟子諸疑網故摧滅外道斷常等見諸僻執故欲令未來鈍根異生利根有情善解緣起明瞭二諦速趣無上菩提正因三從教理兩個方面證明了龍樹大師是聖非凡所說言教以為正量堪可流轉四說明了此論的宗派歸屬即屬大乘之中的空宗其次依次對因緣心論頌之論題及正文作了疏釋本文獻未為我國歷代大藏經所收近代在敦煌發現後被收錄於大正藏第八十五卷第二八一六部但由於大正藏本所用底本為斯號無其它校本斯號首全尾殘結尾部分約殘缺一千多字且錄文錯誤較多如將各無差等的等錯認為互恩惠的恩錯認為思此論雖略的雖略錯認為難思等據不完全統計僅錄文錯誤就有三十多處因此有必要進行重新整理同時為了盡可能地避免錯誤整理者將因緣心論頌因緣心論釋和因緣心釋論開決記三篇文獻作了仔細的對勘具體情況隨文說明整理本底校本情況如下底本斯號首全尾殘及北號二者重複部分以斯為底本以北為乙本校本甲本北號海首全尾殘乙本北號麗首殘尾全丙本伯號錄文

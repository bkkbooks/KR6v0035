body:
  text: 將釋此論先以四門分別然後釋其正論之文言四門者一明造論之主二明造論之因三明所造之論為正量不四辨論所宗初言明造論之主者謂龍猛大師自利他滿證極喜地善見緣起甚深法性善逝受記名稱普聞具諸德者之所造也二言明造論之因者謂龍猛大師為欲斷除五德弟子諸疑網故摧滅外道斷常等見諸僻執故欲令未來鈍根異生利根有情善解緣起明瞭二諦速趣無上菩提正因故造斯論夫欲修行無上菩提正因之者先須善解緣起緣性雜染淨品明了分別二諦之理言二諦者勝義世俗二種諦也言勝義諦者諸法性相無生無起非斷非常超語言道心行處滅唯聖自證之境界也言俗諦者略而言之有其四種一真實二非真三近聖義四清淨言真實者謂內外緣起於聖義諦雖空無物世俗諦門猶如幻化因緣力故成辦現事聖見其過凡愚執實不見其患耽著造作久處生死因果法也言非真者謂陽焰幻化乾城等類世諦門中不成辦事凡亦了達不假聖説非真有也言近聖義者為欲詮其聖義諦故諸佛菩薩善知識等以名句文身施設假立十二分教彼名句文雖非本事若無名等不能顯事故名句等名近聖義也言清淨者謂諸佛如來所有相好力無畏等廣大功德不同異生不善之業染污煩惱之所生長唯是白淨出世道法之所生起故言清淨三言所造之論為正量不者此中有問如來所説緣起緣性甚深微細雖可了知唯佛獨證龍樹大師位階何地此所造論以為正量而可信受答教理二門有證成故此所造論而無錯謬以為正量勿生疑惑教量證成者楞伽經云南天竺國中有名德比丘厥號名龍樹能破有無宗世間中顯我無上大乘法得初歡喜地往生安樂國又大雲經説我滅度後有龍樹苾芻能摧惡見護我正法與善行王同時出現有斯教量而受記故此師制造以為可信理證成者此師在世親證空藏三昧撝空出寶滿有情願於山石壁而無障礙更有勝德文繁不述如餘處明以斯現量而推此師非凡是聖所説言教以為正量堪可流轉四言辨論所宗者大師在世大小乘教各無差等如佛所説依教修行佛滅度後大小乘教為諸師等情執不同各成多宗如餘處説今此論者所詮之宗非小是大就大之中復分三宗一勝義皆空二應理圓實三法性圓融此論所被龍樹菩薩依大般若等經豎立宗故是故此論勝義皆空宗之攝也後言釋其正論文者文分為二一釋論題二明正論釋題中言因緣心論頌者夫諸經論所立名者皆有四義一人二處三喻四義今此名者約義立也為此論中所有一切諸佛菩薩所説緣起廣略二義世及出世雜染還滅如是等義此中攝盡故立此名言因緣者此遮斷常及無因等論諸惡見也言因緣者為何謂耶瑜伽及阿毗達磨集二論云離作用義從因所生義離有情義依他起義無動轉義無常義暫住義因果相續不斷義因果相似義因果種種義因果各決定義是緣起義言心者緣起緣性即是諸佛祕密心藏真實之境此論亦明如是義故故言心也又言心者亦是攝辭此中皆攝諸廣義故所言論者教誡學徒故名為論二言明正論者大門分二一廣二略言廣者七行頌中前五是也言略者後二頌也就廣之中復分為五一三攝十二門即初二頌也二十二支法遞互相生無有始終門即第三頌三十二支法空故無我門即頌中半頌也四十二支法離二邊故無轉移門即頌中始從唯從於空法至不移五還滅門即頌云智應察也即彼五中前四是順後一是逆如理應思廣略二門之中先明其廣就廣之中今當第一明三攝十二門於中文二先問後答言先問者前半頌也言後答者後一頌半而配文也先略釋問辭言此中者是發起辭即如來所説緣起緣性廣略二教於此中也言沙門者即是梵音此云善學亦云善寂即是諸聖及隨彼聖出家衆也此則通於內外學也言樂聞者為遮不信及無樂欲樂欲雖多此中欲令於緣起義明瞭聞也言能聽者謂耳根不壞了聲義也言善能憶持者謂前耳根所聞之義意識憶持專注一境無忘失也言能悟者謂意識憶持所了之義以慧善觀於聞聲義無有遺失餘悉了知也言能觀者而於諸法及出離道功德過失善觀察也言及具簡棄者於染淨品功德過失疑網惡作善簡擇故即前五德二是聞慧一是思慧後二修慧雖言五德亦具五善之想捨五惡想如理應思言來詣師所者謂五德弟子為求法故來詣龍猛菩薩所也言於如來教中者五德弟子非於外道六師等教而有疑惑唯於如來所説緣起廣略二義心生疑惑故發問也言薄伽梵者此云降伏具謂降四魔具六功德也問曰言薄伽梵者獨如來得何故呼師為薄伽梵答為彼弟子而於師所作如來想恭敬之辭又此龍猛住見道位捨諸惡法遠離魔境經有誠言如幻一切法為諸有情説於彼而無畏故號為薄伽龍猛菩薩證極喜地了緣起法如幻化等具斯德故與理無違弟子呼師稱薄伽梵者求何事耶為愛盡故求解脫故非為財利及愛果也言彼於何所攝者為彼弟子或於廣義先已了知而於攝略不善巧故問攝義也言今欲樂聞者雖言樂聞亦攝思修為取果也後明答辭言知彼問其真義者謂龍猛菩薩知彼五德弟子於緣起緣性盡所有性如所有性真義之中心生渴仰無不如法故試問也言師即呼曰汝者為彼弟子先於師所作如來想稱薄伽梵與彼相應即呼曰汝言師者五種師中出家羯磨依止教授也言汝者即是子也子有三種一身所生二口所生三心所生今取後二言作此分明者而語與義無有相違稱彼問答故言分明言典切之語者語無有失而無雜亂義理分明利益聽衆有果獲也次下又重釋問辭釋論也言此中十及二故曰為十二者若十及二不別説者數為二十有增加過故此言也問不言十一不言十三定言十二為何謂耶若言十一義不具足若言十三而無所用有增減過故定十二又三世因果用十二故謂從於前際至中際因者無明行識果謂名色助因為受從於中際至後之因從識至愛果謂生死老助因取有住中際者從識至愛故定十二又十二者初三即是能引支也名色六入觸受四法所引支也愛取有三能成支也生支一法所成支也老死即是過失支也能引支者顯其遠因能成支者即示近因若無此二生不成故言支即差別故言差別如車支分故説為支者除十二支別無差別即十二支性相業用名不同故立差別義如車支分若離輪等別無有車此亦如是十二支法明性相者如稻稈經説何者無明於此六界起於一想一合想常想堅牢想不壞想安樂想衆生命生者養育士夫補特伽羅儒童作者我我所想等及餘種種無知此是無明有無明故於諸境界起貪瞋癡於諸境界起貪瞋癡者此是無明緣行而於諸事能了別者名之為識與識俱生四取蘊者此是名色依名色諸根名為六入三法和合名之為觸覺受觸者名之為受於受貪著名之為愛增長愛者名之為取從取而生能生業者名之為有而從彼因所生之蘊名之為生生已蘊成熟者名之為老老已蘊滅壞者名之為死臨終之時內具貪著及熱惱者名之為愁從愁而生諸言辭者名之為歎五識身受苦者名之為苦作意之識受諸苦者名之為憂具如是等及隨煩惱者名之為惱十二支法明業用者如阿毗達磨集論説無明作何業耶而於諸有迷諸有情亦與諸行而作緣也行作何業而於諸趣顯現有情亦與識作習氣緣也識作何業能持有情業之纏縛亦與名色而作緣也名色作何業令諸有情而取於身亦與六入而作緣也六入作何業令諸有情圓滿受身觸作緣也觸作何業令諸有情受用於境受作緣也受作何業令諸有情趣生受用愛作緣也愛作何業令諸有情而引於生取作緣也取作何業取後有故令諸有情而識有取有作緣也有作何業令諸有情趣向後有生作緣也生作何業令諸有情次第成就名色六入而觸及受老死緣也老死作何業令諸有情數數轉變壽及命也十二支法釋其名者如稻稈經説大黑暗故名為無明造作故名諸行了別故名識相依故為名色為生門故名六入觸故名觸受故名受渴故名愛取故名取生後有故名有生蘊故名生蘊熟故名老蘊壞故名死愁故名愁歎故名歎惱身故名苦惱心故名憂煩惱故名惱言能寂身口故名能仁者雖不言意能寂身口而從於彼意淨因生但果清淨知因淨故而不言也言彼非自性者次下有十種外道僻執此第一也謂裸形外道執六種法為法自性一有壽二無壽三有漏四繫縛五持禁戒六解脫若不了別此六法者輪轉生死若了別時而得解脫或有一類而執有情微塵昧暗平等自性即彼士夫為法自性二言決定者此是數論外道宗也謂有一類而執諸法從彼生者即是彼果彼即是因是故因果各各決定人天等趣不相雜亂生死輪轉言士夫者此亦數論宗也謂有一類執有衆生及以士夫為諸法因不了此二久處生死雖相雜住若了別時即得解脫士夫者而有千頌善解法術或執士夫有大力用各在有情身內住也四言相假者謂有一類外道説言日月星宿日數即是法因順彼作業成辦其事若違彼者即不成就是故諸法是彼自性若不了彼久處輪回若了別者即得解脫又言相假者有諸外道起如是見立如是論若有衆生於殑伽河等沐浴支體而得清淨或有一類執獨等戒以為清淨不假善惡而感異熟但假日月沐浴等法以為清淨五言自在者此亦數論宗也謂有一類説諸有情其受苦樂不從善惡唯自在變彼由現見於因果中世間有情不隨欲轉故作此計所以者何現見世間有情於彼因時欲修淨業不遂本欲反更為惡於彼果時願生善趣樂世界中不遂本欲墮惡趣等意謂受樂不遂所欲反受諸苦由此見故彼作是思六言時者此亦數論宗也謂執有情所受苦樂不假善惡但待於時受苦樂報如夏草青冬即變白如是等類非由善惡是時變故七言自然者謂有一類計一切法六自然性一物二德三業四總五苦六連若了此六而得解脫若不了者輪轉生死或有妄計棘鐵豆圓如是等事是誰而作皆自然性八九十言隨欲化主偶遇者此三宗見是無因論謂有一類而依世間諸靜慮故見世施主一期受命恆行布施無有斷絶從此命終生下賤家貧窮匱乏彼作是思定無施與愛養祠祀復見有人一期壽中恆行妙行或行惡行見彼命終墮於惡趣生諸那落迦或往善趣生於天上樂世界中作彼是思定無妙行及與惡行亦無善行惡行二業業果異熟或復有時見諸因緣空無果報謂見世間無有因緣或時歘爾大風卒起於一時間寂然止息或時忽爾暴河瀰漫於一時間頃則空竭或時郁爾草木繁榮於一時間颯然衰悴由如是故起如是等三種見也言等者等攝諸餘外道僻執非獨前十言所生者與前九文一一相合言此是因緣所生者能仁所説內外諸法緣起緣性唯有正因及以助因別無自性決定等故次下初門第二明答辭釋論也言此差別十二支法於煩惱業苦遞互相依猶如束蘆於彼三中並皆攝盡者譬如世間以束蘆等立成其捨獨一不成如是十二支法三中攝盡和合相依共作雜染淨品因果無獨勝能闕一不成言盡者即是無餘義也者於三法中十二支法無有一法攝不盡故雜染因果遍攝盡故五德弟子所問之疑悉皆斷故又次下言問曰等者是下答辭發起文也言問曰者五德弟子問師之辭言何者煩惱何者是業何者是苦此差別之法當於何攝者謂軌範師云何三法攝於十二已説分明典切之語我已知矣十二法中幾煩惱道幾是業道幾是苦道攝幾因幾果我今疑惑請為解釋故生問也言答曰者謂師欲斷除弟子疑惑而對答也言初八九煩惱者為此三法擾亂有情法義同故故煩惱攝非體相同謂無明於事不明瞭時擾亂心故愛著事時擾亂心故取耽於事行行之時擾亂心故故十地經云三道成就苦諦集諦無明愛取則雜染道而無斷絶行有二法業道不斷餘七支法苦道不斷此論與經義同一也言二及十是業者為此二法體相雖殊造作義同故立業名謂行即從於身口意門造福等業有增後有而作業故言餘七皆是苦者謂此七法而皆從於業雜染生同一果相三八苦性故立苦名經及諸論先列無明末後老死有何義趣次第如是為諸有情從無始來不了因果及以真性而有迷惑從於迷惑而有造作以行習氣令心顛倒心顛倒故而於當來續生名色以相續故六處成就根成就故而觸於境即便觸受於境受用受用境故於境染著未來生愛以生欲故取求積集以積集故來生果因有便成就即有起故而於五趣而受生也以有生故即有老死諸有情類從無始來輪轉生死因果次第如是故也次第如是無明等法各各單己為有差別一一法中皆有差別謂無明有十九種一前際無知二後際無知三彼二俱無知四內無知五外無知六內外無知七業無知八異熟無知九業異熟無知十於佛無知十一於法無知十二於僧無知十三於苦無知十四於集無知十五於滅無知十六於道無知十七於因無知十八於果無知十九於處無知行有三種謂罪行福行及不動行識有八種謂從眼識至阿賴耶識名色有二種一圓滿謂下二界二不圓滿謂無色界六入有六謂眼根等而觸有六謂從眼觸至意觸也受有十八謂眼具三至意具三愛有三種謂三界愛取有四種謂欲見禁及我論也而有十二謂生果業集死生中有三界五趣生有四種謂胎生等髮白面皺等是老差別死及死性別離壽壞等是死差別言皆者是總攝之辭者謂大小乘教説有八苦識等七法但攝其五餘三不説何故爾耶為伏此難故言皆者攝三苦也識等七法云何攝五謂識名色及以六入即攝五盛蘊苦受觸二法即攝病苦生攝生苦老死即攝老苦死苦又經説言三苦八苦此但攝八三復云何識名色六入即行苦故觸受二法即苦苦故生老死二即變苦故言是故此十二支法於業煩惱苦中等者即是頌中十二唯三攝釋論辭也言唯者是其遮義經中所説之法此中攝盡更無有餘者顯論勝能也此論雖略遍攝諸經廣大義故此下大門第二明十二支法遞互相生無有始終門釋論也言問曰此義已知彼煩惱業苦云何相生請為解説者十二支法三道攝者師作分明典切之語於中所有盡所有性如所有性我今無倒皆悉了知彼十二支法何者是因何者是果云何相生所有因果今欲樂聞請為解説此顯自能及生起也言從三煩惱生於二業者謂從無明而生於行從於愛取生有故也言謂上所説苦法者即至前門文中所謂識名色六入觸受生老死故謂從於行從識至受五法生故從有而生生老死故言所謂諸煩惱者即無明愛取也所謂從識至受生於愛取從生老死生無明故十二支法遞互相生者於四緣中各具幾緣而作緣耶各除因緣緣具餘三緣無明若生身語行法有色之者以增上緣而作其緣也若生非色意行法者等無間緣所緣緣增上緣而作緣也如是餘支若生有色以增上緣而作其緣若生非色以所緣緣等無間緣增上之緣而為緣也如是非色而於有色亦增上緣而為其緣而於非色亦以等無間緣所緣緣增上緣而為其緣隨所應知十二支法何故互相而不作其因緣緣耶因緣緣者各各自種而顯現故餘有廣義文繁不述如瑜伽論言言有者有其三種所謂欲色無色者此顯三界有也欲界者未離欲愛欲名為欲界色界者已離欲愛欲未離色愛欲名為色界無色界者已離欲愛欲及離色愛欲未離無色欲名無色界欲界有者所謂十種一欲界無始時有二業有三死有四中有五生有六那落迦有七傍生有八鬼趣有九人趣有十天趣有此名欲有於中第一第三第五名自性有業者具引其果義立有義也中有者而於其果得後有義故名為有也五趣有者而於其果有受用義故名有也色界有者除三惡道及以人趣餘六是也無色有者除三惡道人及中有餘五是也言於中不息而作流輪者所謂於三有中無時暫住無有始終煩惱業因增上力故三界五趣受苦果故取輪喻者顯不住義也言彼諸異生世間而自流浪者謂三有中於中不息雖作流輪無有作者唯有異因異果無有義利自流浪故言言此者顯不定義非如輪轉次第生於諸有此即不定者為諸有情三界五趣隨業受生無次第故次下大門第三明十二支法空故無我門釋論也言問曰何者是身之自在衆生耶彼之作用其事云何者即是下論生起問也謂師先説三攝十二及以遞互相生之門唯言十二更無別物若如是者諸趣有情各各身中皆有自在名為衆生而即於彼起衆生想衆共稱傳為彼本無何不宣説若是有者性相業用其事如何願師解釋言自在者謂見聞等也言諸趣唯因果唯除假名此中無衆生者謂三界四生及以五趣名為諸趣即彼諸趣唯從煩惱業因而生苦果於因果上假立衆生隨彼假立起衆生想除彼因果更別無有衆生故也論文略故雖言無衆生亦攝受者補特伽羅士夫作者等諸橫計名故瑜伽等論云離有情義是緣起義於離有情復無常義若是無常復暫住義若是暫住復依他義若依他義即離作用義是緣起義等廣如論説言此是真實義非假立有者所謂即此無衆生等緣起緣性甚深之義諸佛出現若不出現性相如是非同外道橫妄計我等假立有故故言真實言假立之境不成實物者為有難言若彼假立衆生有者假立衆生即是有故何故汝言此中無衆生耶為答此難故此言也次下大門第四明十二支法離二邊故不轉移門釋論辭也此文分二初法後喻此分法也言問曰若如是者所謂如前諸趣唯因果此中無衆生若如是故也言誰從此世至於他世者若無我人衆生壽者誰從此世造善惡業移至他世受善惡報又若無我至他世者外道亦言無有他世立斷見論此何差別言答曰無有極微等法者所謂於五蘊中無有少許至他世故也言雖然者雖五蘊中無有少法而至他世唯從於空法還生於空法故也言唯從於空法還生於空法者此頌意明因中無有極微等法而至於果故轉有經云業者作已滅壞滅已不住方所雖然臨終之時各各近住心意中現如是大王後識滅時生分之識最初生於人天等趣無有一法從於此世移至他世雖然亦現捨壽及初生法也最後滅識名為捨壽初生之識名為生法最後滅者無有至處初生法者無所從來何以故自性寂故後識後空捨壽捨壽空業業自空初識初空生者生空雖然而業不失是故此論與經義同餘釋論辭自明不説次下後明喻也言此中問曰等請辭者從空生空微細難知故請喻也言此中答曰等立八喻者雖詮一義為諸有情根機不等建多喻也言言蘊者即色受想行識蘊也者此五蘊相所有廣義如五蘊等餘論所明今略辨相言色蘊者謂四大種及四大種所造諸色言受蘊者謂三領納一苦二樂三不苦不樂樂謂滅時有和合欲苦謂生時有乖離欲不苦不樂謂無二欲言想蘊者謂於境界取種種相此復有三謂小想大想及無量想言行蘊者謂除受想諸餘心法以及心不相應行言識蘊者謂於所緣境了別為性此復有三一六轉識二末那識三阿賴耶識言相續結者滅已從彼因所生餘者是也若因果各別不相雜故因滅果生如稱高下同一剎那無時隔也言是故流轉從於虛妄分別習氣而生者流轉即是七法苦果虛妄分別習氣即煩惱業五因法也次下大門第五明還滅門釋論也言後言應者即是逆觀義當知反彼等釋論辭者與上論頌智應察相合故後言應者即是逆觀義當知反彼雜染因果三道法也此中有問云何反彼雜染因果三道法耶為欲顯示真聖之道故故言應觀諸法無常苦空無我等也言應觀諸法者謂觀順流十二法也言無常者無明等法滅壞性故言苦者無明等法生死因果即是三苦八苦性故言空者無明等法遠離於常不壞無轉橫計我故言無我者無明等法從因緣生不自在故無常等四即是諸法共相四法印也言則不愚諸事者以聖道力觀四法印澄現觀時了無明等性相空故此顯無明得轉依也言若不愚者則無有貪者為無明轉依明見諸法無可著故此則名為愛轉依也言若無有貪瞋則不生若無有瞋則無有業者具貪瞋法即有造作名之為行無貪瞋故行轉依也言若無有業則無有取者無三行故四取不起取轉依也言若無有取則不造後有者生後有故名之為有無四取故有轉依也上五之文因轉依也言若無後有而即不生者本無今有名之為生初生之者即是其識有不生故識轉依也言若不生者即於身心而苦不生者此明名色六處觸受生及老死得轉依也謂名色中色六處中五色根生及老死身苦攝故名色中唯名六處中意處及以觸受心苦攝故大小乘經無明滅故行滅乃至生滅故老死等滅者與此義同如理應思言如是不集五種因故即於餘處而果不生者結上文也言此是解脫者若能如是如上所説逆觀緣起順流之法隨自樂欲而證三乘究竟解脫法性身故言是故斷除斷常等諸惡見者此顯論所詮也次下大門第二略明正論文分為二一順二逆與下二頌隨次應知此初也言此中有頌者謂略明正論中也言於甚微細事者所謂如前所説三攝十二門等順流法也彼四種法微細難知故十地經云微細難知大仙道離觀分別甚難觸極細難見離分別離心地故修亦難此倡意明時説微細故證時微細故此二與前微細難知大仙之道隨次應知非分別境故為本自性非分別故離觀分別甚難觸也非聞思德所緣境故極細難見也非世修德所緣境故離分別也非世俱生德之所緣離心地也又阿毗達磨集論云緣起之法以五義故名為甚深一因甚深謂對治不平等因無因論故二義深也二性相甚深謂無我故一義深也三生甚深謂雖從緣生彼不作故二義深也四處所甚深謂雖無處所顯現處所二義深也五生起甚深謂從因果生為難知故四義深也言若有見斷者彼不善因緣未見緣生義者若人於彼如上所説緣起義中惡見分別起斷見者諸惡見中此見罪重偏列此見亦攝諸餘常等見也故理論云於甚微細事若有見生者彼不善緣起未見緣生義是故於此緣起緣性妄計分別起斷常等邪分別者不見法性無出離心久處輪回又瑜伽論云於緣起義不善知者有五過失一起我見二增長前際及後際見三於前後際橫起見執四取著熱惱五於現法不般涅槃更有過失如餘處明次後明順逆也言此中無可遣亦無少安立者謂如上所説緣起緣性真理之中無有少法聖可除遣凡可建立涅槃妙淨生死喧雜體一如故文殊國土莊嚴經云無生之法常如來一切諸法名善逝又理論云彼彼從緣起自性而不生彼彼從緣起自性而不滅見遣修者迷倒有情不了法性妄起遣修故二真諦經云譬如有人夢被蛇蜇求醫對藥而得差除心生歡喜從睡而覺都無有實此亦如是言於真以觀真見真而解脫者所謂緣起真理無遣立者即真義故若有智者修道見真隨所修道各獲解脫證法身故故稻秆經云若見因緣則能見法若見於法則能見佛又理論云若於緣起法遠離生滅壞智者如是知能度見有海更有經論與此義同者智者尋之録文完
